server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/auth/**
        
        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://patient-service:8082}
          predicates:
            - Path=/patients/**

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-minimum-32-characters}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    root: INFO
    com.patientmanagement.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
