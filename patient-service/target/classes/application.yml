# ============================================================================
# DEVPLAN PHASE 4.1 & 4.3: SERVICE SETUP & KAFKA PRODUCER CONFIGURATION
# ============================================================================
# This file implements:
# - Phase 4.1 - Service Setup from DEVPLAN.md
#   Configure PostgreSQL connection (separate database)
#   Set up Spring Data JPA
#
# - Phase 4.3 - Kafka Producer Setup from DEVPLAN.md
#   Configure Kafka producer (broker URL from env var)
# ============================================================================
#
# PATIENT SERVICE CONFIGURATION

server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: patient-service
  
  # ============================================
  # DATASOURCE CONFIGURATION
  # ============================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-patient:5432/patient_db}
    username: ${SPRING_DATASOURCE_USERNAME:patient_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change-this-password}
    driver-class-name: org.postgresql.Driver
  
  # ============================================
  # JPA CONFIGURATION
  # ============================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # ============================================
  # KAFKA CONFIGURATION
  # ============================================
  kafka:
    # BOOTSTRAP SERVERS: Kafka broker addresses
    # Format: host1:port1,host2:port2
    # "kafka" is the Docker Compose service name
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    
    # ============================================
    # PRODUCER CONFIGURATION
    # ============================================
    # Producer sends messages to Kafka
    producer:
      # KEY SERIALIZER: How to serialize the message key (String)
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      
      # VALUE SERIALIZER: How to serialize the message value (String - JSON)
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      
      # ACKS: Acknowledgment setting
      # "all" means: wait for all replicas to acknowledge (most reliable)
      # Other options: "0" (fire and forget), "1" (leader only)
      acks: all
      
      # RETRIES: Number of times to retry failed sends
      retries: 3

# ============================================
# LOGGING
# ============================================
logging:
  level:
    root: INFO
    com.patientmanagement.patient: DEBUG
    org.springframework.kafka: DEBUG
